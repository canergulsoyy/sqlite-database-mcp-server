# 🐳 Database MCP Server Docker Compose
# Development ve production ortamları için

version: '3.8'

services:
  # ========================================
  # Database MCP Server
  # ========================================
  database-mcp-server:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: database-mcp-server
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MCP_SERVER_PATH=./dist/index.js
      - DB_PATH=./data/app.db
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    ports:
      - "3000:3000"
    networks:
      - mcp-network
    depends_on:
      - database-setup
    healthcheck:
      test: ["CMD", "node", "-e", "console.log('Health check passed')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================================
  # Database Setup Service
  # ========================================
  database-setup:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: database-setup
    command: sh -c "npm run db:setup && npm run db:seed"
    environment:
      - NODE_ENV=development
      - DB_PATH=./data/app.db
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    networks:
      - mcp-network
    profiles:
      - setup

  # ========================================
  # Development Service
  # ========================================
  database-mcp-server-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: database-mcp-server-dev
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MCP_SERVER_PATH=./dist/index.js
      - DB_PATH=./data/app.db
    volumes:
      - ./data:/app/data
      - ./src:/app/src
      - ./.env:/app/.env:ro
      - /app/node_modules
    ports:
      - "3001:3000"
    networks:
      - mcp-network
    profiles:
      - dev
    command: npm run dev

  # ========================================
  # Test Service
  # ========================================
  database-mcp-server-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: test
    container_name: database-mcp-server-test
    environment:
      - NODE_ENV=test
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - MCP_SERVER_PATH=./dist/index.js
      - DB_PATH=./data/test.db
    volumes:
      - ./data:/app/data
      - ./.env:/app/.env:ro
    networks:
      - mcp-network
    profiles:
      - test
    command: npm run test:client

  # ========================================
  # Monitoring Service (Optional)
  # ========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - mcp-network
    profiles:
      - monitoring

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - mcp-network
    profiles:
      - monitoring

# ========================================
# Networks
# ========================================
networks:
  mcp-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# ========================================
# Volumes
# ========================================
volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

# ========================================
# Profiles
# ========================================
# Development: docker-compose --profile dev up
# Test: docker-compose --profile test up
# Setup: docker-compose --profile setup up
# Monitoring: docker-compose --profile monitoring up
# Production: docker-compose up (default) 